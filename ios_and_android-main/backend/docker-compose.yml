version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: campus_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-campus123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-campus_app}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: campus_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-campus123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-campus_app}
      SECRET_KEY: ${SECRET_KEY:-1TCrZ6E3c7rKgk-liELZXZ5Jct8P12bqvAeqpA5G2F4}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
